# Server Configuration
server.port=8080
spring.application.name=MS-gateway
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# Spring Cloud Gateway Configuration
spring.cloud.gateway.routes[0].id=usuarios
spring.cloud.gateway.routes[0].uri=http://ms-usuarios:8085
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.routes[1].id=locations
spring.cloud.gateway.routes[1].uri=http://ms-location:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/locations/**

spring.cloud.gateway.routes[2].id=reservas
spring.cloud.gateway.routes[2].uri=http://ms-reservas:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservas/**

spring.cloud.gateway.routes[3].id=notificaciones
spring.cloud.gateway.routes[3].uri=http://ms-notificaciones:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notificaciones/**

spring.cloud.gateway.routes[4].id=pagos
spring.cloud.gateway.routes[4].uri=http://ms-gestion-pago:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/pagos/**,/api/tarjetas/**

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations[0].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations[0].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations[0].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations[0].allowCredentials=true

# Actuator
management.endpoints.web.exposure.include=health,info,gateway,circuitbreakers

# Resilience4j Circuit Breaker Configuration for Gateway
resilience4j.circuitbreaker.instances.gateway-usuarios.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gateway-usuarios.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gateway-usuarios.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.gateway-usuarios.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.gateway-usuarios.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gateway-usuarios.failureRateThreshold=50

resilience4j.circuitbreaker.instances.gateway-locations.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gateway-locations.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gateway-locations.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.gateway-locations.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.gateway-locations.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gateway-locations.failureRateThreshold=50

resilience4j.circuitbreaker.instances.gateway-reservas.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gateway-reservas.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gateway-reservas.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.gateway-reservas.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.gateway-reservas.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gateway-reservas.failureRateThreshold=50

resilience4j.circuitbreaker.instances.gateway-notificaciones.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gateway-notificaciones.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gateway-notificaciones.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.gateway-notificaciones.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.gateway-notificaciones.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gateway-notificaciones.failureRateThreshold=50

resilience4j.circuitbreaker.instances.gateway-pagos.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gateway-pagos.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gateway-pagos.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.gateway-pagos.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.gateway-pagos.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gateway-pagos.failureRateThreshold=50

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
